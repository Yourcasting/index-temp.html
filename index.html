<!DOCTYPE html>
<html lang="lv">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Casting</title>

<style>

body{
margin:0;
background:#0e0e0e;
font-family: 'Georgia', serif;
color:white;
}

/* LOGO */

.logo{
position:absolute;
top:30px;
left:40px;
font-size:14px;
letter-spacing:3px;
}

/* HERO LAYOUT */

.hero{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
gap:80px;
padding:0 10%;
}

/* IMAGE */

.hero img{
width:350px;
height:450px;
object-fit:cover;
}

/* MENU */

.menu{
display:flex;
flex-direction:column;
gap:25px;
}

.menu a{
color:white;
text-decoration:none;
font-size:34px;
display:flex;
align-items:center;
justify-content:space-between;
width:300px;
transition:0.3s;
}

.menu a:hover{
opacity:0.6;
}

.number{
font-size:12px;
opacity:0.5;
}

/* MOBILE */

@media (max-width:900px){

.hero{
flex-direction:column;
gap:40px;
text-align:center;
}

.menu a{
width:auto;
}

}

</style>

</head>

<body>

<div class="logo">
YOUR CASTING
</div>

<section class="hero">

<img src="model.jpg">

<div class="menu">

<a href="#">About <span class="number">01</span></a>

<a href="#">Essays <span class="number">02</span></a>

<a href="#">Lookbook <span class="number">03</span></a>

<a href="#">Illustrations <span class="number">04</span></a>

<a href="#">Blog <span class="number">05</span></a>

<a href="#">Contact <span class="number">06</span></a>

</div>

</section>

</body>
</html>
